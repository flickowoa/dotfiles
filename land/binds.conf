# workspace — routed through AGS (YorHa rice) so the triangle-flip transition
# plays BEFORE Hyprland switches. AGS dispatches the actual `hyprctl workspace`
# only after the cover is fully up.
bind=$MOD1,1,exec,$HERE/themes/yorha/scripts/ws-go 1
bind=$MOD1,2,exec,$HERE/themes/yorha/scripts/ws-go 2
bind=$MOD1,3,exec,$HERE/themes/yorha/scripts/ws-go 3
bind=$MOD1,4,exec,$HERE/themes/yorha/scripts/ws-go 4
bind=$MOD1,5,exec,$HERE/themes/yorha/scripts/ws-go 5
bind=$MOD1,6,exec,$HERE/themes/yorha/scripts/ws-go 6
bind=$MOD1,7,exec,$HERE/themes/yorha/scripts/ws-go 7
bind=$MOD1,8,exec,$HERE/themes/yorha/scripts/ws-go 8
bind=$MOD1,9,exec,$HERE/themes/yorha/scripts/ws-go 9
bind=$MOD1,0,exec,$HERE/themes/yorha/scripts/ws-go 10

bind=$MOD2,1,movetoworkspace,1
bind=$MOD2,2,movetoworkspace,2
bind=$MOD2,3,movetoworkspace,3
bind=$MOD2,4,movetoworkspace,4
bind=$MOD2,5,movetoworkspace,5
bind=$MOD2,6,movetoworkspace,6
bind=$MOD2,7,movetoworkspace,7
bind=$MOD2,8,movetoworkspace,8
bind=$MOD2,9,movetoworkspace,9
bind=$MOD2,0,movetoworkspace,10

bind=$MOD1,mouse_down,exec,$HERE/themes/yorha/scripts/ws-go +1
bind=$MOD1,mouse_up,exec,$HERE/themes/yorha/scripts/ws-go -1

# hyprland
bind=$MOD1,Q,killactive,
bind=$MOD1,E,exec,nautilus
bind=$MOD1,S,togglefloating,
bind=$MOD1,P,pseudo,
bind=$MOD1,left,movefocus,l
bind=$MOD1,right,movefocus,r
bind=$MOD1,up,movefocus,u
bind=$MOD1,down,movefocus,d
bind=$MOD1,g,togglegroup
bind=$MOD1,tab,changegroupactive
bind=$MOD1,f,fullscreen
bind=$MOD1,c,centerwindow

bindm=$MOD1,mouse:272,movewindow
bindm=$MOD1,mouse:273,resizewindow

binde=,xf86audiolowervolume,exec,$VOLRED
binde=,xf86audioraisevolume,exec,$VOLINC

binde=,xf86monbrightnessup,exec,$BRIGHTINC
binde=,xf86monbrightnessdown,exec,$BRIGHTRED

binde=,xf86kbdbrightnessup,exec,$KBDBRIGHTINC
binde=,xf86kbdbrightnessdown,exec,$KBDBRIGHTRED

# util
bind=$MOD1, space, exec,$DRUN
#bind=$MOD1,t,exec,$TERM --start-as=fullscreen -o 'font_size=25' --title all_is_kitty
bind=$MOD1,RETURN,exec,$TERMFLOAT
bind=$MOD2,RETURN,exec,$TERM
bind=$MOD1 SHIFT,s,exec,$SCREENSHOT

bind=$MOD1,L,exec,$LOCK

