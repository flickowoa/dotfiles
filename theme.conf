exec=fish -c "set -Ux COLORFILE $yorha/colors_nier_light" && pkill -USR2 fish
exec=fish -c "set -Ux STARSHIP_CONFIG $yorha/components/starship.toml"
exec=fish -c "set -Ux HYPRLAND_THEME $yorha"
exec=pkill -f ags.js; pkill ags; pkill mako; pkill waybar
# rebuilt the whole bar on ags 3.x (astal/ts), the old 1.x js api doesnt exist anymore
exec=sleep 1 && $HOME/.local/bin/ags run --gtk 3 $HOME/.config/hypr/themes/yorha/components/ags/app.ts >/tmp/ags-yorha.log 2>&1
exec=awww-daemon
exec=hyprctl setcursor nier_cursors 48
exec-once=pkill dunst
exec-once=pkill mako
exec-once=sleep 1 && awww img $HOME/.config/hypr/themes/yorha/wallpapers/nier_light.png --transition-type simple --transition-step 255
exec-once=hyprpm reload -nn

bind=ALT SUPER,i,exec,echo "toggle-settings" | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/astal/yorha.sock
bind=,Print,exec,echo "screenshot" | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/astal/yorha.sock
bind=CTRL SHIFT ALT,r,exec,$HOME/.config/hypr/themes/yorha/scripts/ags-restart.sh
bind=SUPER CTRL,Delete,exec,hyprctl reload

####################################################################
# setting these here will override the values in main hyprland.conf
# $DRUN=ags -b settings -t settings  # old ags 1.x syntax, disabled
$SCREENSHOT=$HOME/.config/hypr/themes/yorha/scripts/screenshot

$TERM=kitty --config $HOME/.config/hypr/themes/yorha/components/kitty/yorha_light.conf
$TERMFLOAT=kitty --config $HOME/.config/hypr/themes/yorha/components/kitty/yorha_light.conf --title fly_is_foot
####################################################################

source = $HOME/.config/hypr/themes/yorha/theme_nier_light.conf

# ignorealpha got removed in newer hypr, no replacement so i just dropped these
# layerrule = ignorealpha 0.3, bg_settings
# layerrule = ignorealpha, side
# layerrule = ignorealpha, bar
# layerrule = ignorealpha, geom

# blur syntax changed on 0.55 -
layerrule = blur 1, match:namespace bg_settings
layerrule = blur 1, match:namespace side
layerrule = blur 1, match:namespace bar

decoration {
    rounding = 0
    blur {
        enabled = 1
        size = 5
        passes = 1
        noise = 0.05
    }
    shadow {
        range = 1
        render_power = 1
        offset = 5 5
    }
    screen_shader = $HOME/.config/hypr/themes/yorha/components/gridlines.frag
}

plugin {
    hyprbars {
        bar_height = 40
        bar_text_size = 17
        bar_text_font = FOT-Rodin Pro M
        bar_text_align = left
    }
}

general {
    col.active_border = 0x00000000
    col.inactive_border = 0x00000000
    border_size = 0
    gaps_in = 20
    gaps_out = 20
}

animations {
    enabled = 1
    bezier = inout, 0.65, 0.01, 0, 0.95
    bezier = woa, 0, 0, 0, 1
    bezier = niercurve, 0.4, 0, 0.2, 1
    bezier = swiftOut, 0.05, 0.7, 0.1, 1.0
    animation = windows,    1, 4, swiftOut, slide left
    animation = windowsIn,  1, 4, swiftOut, slide left
    animation = windowsOut, 1, 3, swiftOut, slide right
    animation = windowsMove, 1, 4, swiftOut, slide
    animation = border, 1, 10, default
    animation = fade, 0
    animation = fadeIn, 0
    animation = fadeOut, 0
    animation = layers, 0
    # ive added a tile transition between workspaces, and
# to avoid hypr switch coming first, it blocks and animates first, switches after
    animation = workspaces, 0
}

bind=SUPER ALT,o,exec,echo "toggle-player" | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/astal/yorha.sock
bind=CTRL SHIFT ALT,t,exec,echo "toggle-dark" | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/astal/yorha.sock
bind=ALT,F11,exec,echo "dismiss-notifs" | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/astal/yorha.sock
# windowrule v3 syntax (match:field) for 0.55
windowrule = move 400 510, match:title ^(fly_is_foot)$
